- name: Publish Web
  run: dotnet publish FinTrack.Web/FinTrack.Web.csproj -c Release -o publish/Web

- name: Publish API
  run: dotnet publish FinTrack.API/FinTrack.API.csproj -c Release -o publish/API

- name: Publish Core
  run: dotnet publish FinTrack.Core/FinTrack.Core.csproj -c Release -o publish/Core

- name: Publish Infrastructure
  run: dotnet publish FinTrack.Infrastructure/FinTrack.Infrastructure.csproj -c Release -o publish/Infrastructure