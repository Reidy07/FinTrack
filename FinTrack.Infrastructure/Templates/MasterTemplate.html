<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
</head>
<body style='margin: 0; padding: 0; background-color: #070A12; font-family: Arial, sans-serif; color: #ffffff;'>
    <table width='100%' cellpadding='0' cellspacing='0' style='background-color: #070A12; padding: 40px 20px;'>
        <tr>
            <td align='center'>
                <table width='100%' max-width='600' cellpadding='0' cellspacing='0' style='max-width: 600px; background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; overflow: hidden;'>
                    <!-- Header -->
                    <tr>
                        <td style='padding: 30px 40px; background-color: #1f2937; text-align: center; border-bottom: 2px solid #34d399;'>
                            <h1 style='margin: 0; color: #34d399; font-size: 28px; letter-spacing: -1px;'>FinTrack</h1>
                            <p style='margin: 5px 0 0 0; color: #9ca3af; font-size: 14px;'>Inteligencia Financiera</p>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style='padding: 40px; font-size: 16px; line-height: 1.6; color: #e5e7eb;'>
                            <h2 style='margin-top: 0; color: #ffffff; font-size: 20px;'>{{Subject}}</h2>
                            <div style='margin-top: 20px;'>
                                {{Body}}
                            </div>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style='padding: 20px; text-align: center; font-size: 12px; color: #6b7280; background-color: #0f172a;'>
                            <p style='margin: 0;'>Este es un mensaje automático de FinTrack App. Por favor, no respondas a este correo.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
