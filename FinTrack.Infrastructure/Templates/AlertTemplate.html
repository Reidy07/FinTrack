<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
    </head>

    <body>
        <div style='background-color: rgba(248, 113, 113, 0.1); border-left: 4px solid #f87171; padding: 20px; border-radius: 8px;'>
            <p style='color: #f87171; font-weight: bold; margin-top: 0; font-size: 18px;'>🚨 {{AlertTitle}}</p>
            <p style='color: #e5e7eb; font-size: 16px;'>{{AlertMessage}}</p>
            <p style='margin-bottom: 0;'>
                <a href='{{ActionUrl}}' style='display: inline-block; padding: 10px 20px; background-color: #34d399; color: #000; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 15px;'>{{ActionText}}</a>
            </p>
        </div>
    </body>
</html>
